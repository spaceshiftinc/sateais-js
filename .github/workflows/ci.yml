# CI: feature/* → develop / main の PR・push で実行する品質ゲート。
# 型・Lint・Format・ビルド・テスト・pack 同梱検証を Node 18/20 マトリクスで回す。
name: CI
run-name: CI(${{ github.head_ref || github.ref_name }})

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

# 同一ブランチの古い実行はキャンセルして無駄を省く
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (Biome)
        run: npm run lint

      - name: Format check (Biome)
        run: npm run format:check

      - name: Build (tsup ESM + CJS + d.ts)
        run: npm run build

      - name: Test (Vitest)
        run: npm test

      - name: Verify pack contents (dist + 型定義の同梱)
        run: npm run verify:pack
